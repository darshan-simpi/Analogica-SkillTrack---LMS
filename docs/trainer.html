<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trainer Dashboard - LMS</title>
  <link rel="stylesheet" href="trainer.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 🔐 ROLE PROTECTION -->
  <script>
    const role = localStorage.getItem("role");
    if (!role || role !== "TRAINER") {
      window.location.href = "login.html";
    }
  </script>

  <header class="header">
    <div>
      <h1>Trainer Dashboard</h1>
      <p id="welcome">Welcome, <strong>Trainer</strong> • Computer Science</p>
    </div>
    <button class="logout">Logout</button>
  </header>

  <section class="cards">
    <div class="card">
      <h4>Total Students</h4>
      <p id="total" class="number">0</p>
    </div>
    <div class="card green">
      <h4>On Track</h4>
      <p id="onTrack" class="number">0</p>
    </div>
    <div class="card red">
      <h4>Behind Schedule</h4>
      <p id="behind" class="number">0</p>
    </div>
    <div class="card blue">
      <h4>Avg. Progress</h4>
      <p id="avg" class="number">0%</p>
    </div>
  </section>

  <section class="charts">
    <div class="chart-box">
      <h3>Status Distribution</h3>
      <canvas id="statusChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Course Completion %</h3>
      <canvas id="completionChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Assignment Submission %</h3>
      <canvas id="assignmentChart"></canvas>
    </div>
  </section>

  <section class="course-list-section">
    <h2>Courses</h2>
    <div id="courseCards" class="course-cards"></div>
  </section>

  <div id="modal" class="hidden"></div>

  <script src="trainer.js"></script>
</body>
</html>
