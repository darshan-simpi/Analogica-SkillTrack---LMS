<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<script>
  // 🔐 ROLE PROTECTION
  const role = localStorage.getItem("role");
  if (!role || role !== "STUDENT") {
    window.location.href = "login.html";
  }
</script>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>LMS</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>My Courses</li>
      <li>Assignments</li>
      <li>Progress</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <h3 id="studentName"></h3>
    </header>

    <!-- DASHBOARD CARDS -->
    <section class="cards">
      <div class="card">
        <h4>Total Courses</h4>
        <p>5</p>
      </div>
      <div class="card">
        <h4>Completed</h4>
        <p>2</p>
      </div>
      <div class="card">
        <h4>Pending</h4>
        <p>3</p>
      </div>
    </section>

    <!-- COURSE LIST -->
    <section class="content">
      <h3>My Courses</h3>

      <table>
        <tr>
          <th>Course</th>
          <th>Progress</th>
          <th>Status</th>
        </tr>
        <tr>
          <td>Python Programming</td>
          <td>60%</td>
          <td>Ongoing</td>
        </tr>
        <tr>
          <td>Web Development</td>
          <td>40%</td>
          <td>Ongoing</td>
        </tr>
        <tr>
          <td>Machine Learning</td>
          <td>20%</td>
          <td>Started</td>
        </tr>
      </table>
    </section>

  </main>
</div>

<script>
  document.getElementById("studentName").innerText =
    "Welcome, " + localStorage.getItem("name");

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
