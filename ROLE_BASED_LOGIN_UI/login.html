<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analogica SkillTrack — LMS</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE (LOGIN) -->
  <div class="login-panel">
    <img src="logo.png" class="logo" alt="Analogica Logo">

    <h2>Analogica SkillTrack — LMS</h2>
    <p class="subtitle">Empowering Skills. Tracking Growth.</p>

    <select id="role">
      <option value="">Select Role</option>
      <option value="ADMIN">Admin</option>
      <option value="STUDENT">Student</option>
      <option value="TRAINER">Trainer</option>
      <option value="INTERN">Intern</option>
    </select>

    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
  </div>

  <!-- RIGHT SIDE (COURSES – READ ONLY) -->
  <div class="info-panel">
    <h3>📢 Upcoming Courses</h3>

    <!-- SCROLLABLE COURSE LIST -->
    <div id="courseList" class="course-scroll"></div>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
